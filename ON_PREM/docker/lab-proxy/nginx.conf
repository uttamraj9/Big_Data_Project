# ITC Big Data Lab Proxy
# Exposes all Cloudera/Hadoop UIs through NodePort services
# Each server block proxies one Hadoop component UI

# ─── YARN ResourceManager UI (172.31.6.42:8088) ────────────────
server {
    listen 8088;
    server_name _;
    location / {
        proxy_pass         http://172.31.6.42:8088/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_read_timeout 60;
        # Fix redirects from internal hostname → public IP
        proxy_redirect http://172.31.6.42:8088/ /;
        sub_filter 'http://ip-172-31-6-42.eu-west-2.compute.internal:8088' '';
        sub_filter_once off;
    }
}

# ─── HDFS NameNode UI (172.31.3.251:9870) ──────────────────────
server {
    listen 9870;
    server_name _;
    location / {
        proxy_pass         http://172.31.3.251:9870/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_redirect http://172.31.3.251:9870/ /;
    }
}

# ─── Spark History Server (172.31.6.42:18088) ──────────────────
server {
    listen 18088;
    server_name _;
    location / {
        proxy_pass         http://172.31.6.42:18088/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_read_timeout 120;
    }
}

# ─── Cloudera Manager (13.41.167.97:7180) ──────────────────────
server {
    listen 7180;
    server_name _;
    location / {
        proxy_pass         http://13.41.167.97:7180/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_read_timeout 120;
        # WebSocket support (CM live logs)
        proxy_set_header Upgrade   $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# ─── Hue (13.41.167.97:8888) ───────────────────────────────────
server {
    listen 8889;
    server_name _;
    location / {
        proxy_pass         http://13.41.167.97:8888/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_read_timeout 120;
        proxy_set_header Upgrade   $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
