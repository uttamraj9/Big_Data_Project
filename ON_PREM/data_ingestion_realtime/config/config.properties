# =============================================================================
# config.properties — Real-time Layer (Kafka + HBase)
# =============================================================================
# Shared configuration for kafka_producer.py and kafka_consumer.py.
# Override any value by setting the equivalent environment variable.
# =============================================================================

# ── FastAPI source ─────────────────────────────────────────────────────────
# FastAPI is deployed in k8s as a NodePort service on port 30080.
# Use the node's internal IP so this works from any machine in the VPC.
api.url=http://172.31.8.235:30080

# ── Kafka ──────────────────────────────────────────────────────────────────
# Kafka runs on both 172.31.3.85 and 172.31.6.42 (multi-broker cluster).
kafka.brokers=172.31.3.85:9092,172.31.6.42:9092
kafka.topic=cc_fraud_stream
kafka.group.id=cc_fraud_consumer_group

# ── Producer tuning ────────────────────────────────────────────────────────
batch.size=100
poll.interval=5

# ── HBase ──────────────────────────────────────────────────────────────────
# HBase Thrift server — must be started in Cloudera Manager before use.
# CM path: Clusters → HBase → HBase Thrift Server → Start
hbase.host=172.31.6.42
hbase.port=9090

# ── Consumer tuning ────────────────────────────────────────────────────────
consumer.batch=50
