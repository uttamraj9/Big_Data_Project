apiVersion: v1
kind: ConfigMap
metadata:
  name: lab-proxy-nginx-conf
  namespace: itc-training
data:
  default.conf: |
    # YARN ResourceManager UI
    server {
        listen 8088;
        location / {
            proxy_pass         http://172.31.6.42:8088/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_read_timeout 60;
        }
    }
    # HDFS NameNode UI
    server {
        listen 9870;
        location / {
            proxy_pass         http://172.31.3.251:9870/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
        }
    }
    # Spark History Server
    server {
        listen 18088;
        location / {
            proxy_pass         http://172.31.6.42:18088/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_read_timeout 120;
        }
    }
    # Cloudera Manager
    server {
        listen 7180;
        location / {
            proxy_pass         http://13.41.167.97:7180/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_http_version 1.1;
            proxy_read_timeout 120;
        }
    }
    # Hue (exposed on 8889 to avoid conflict with CM port)
    server {
        listen 8889;
        location / {
            proxy_pass         http://13.41.167.97:8888/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_http_version 1.1;
            proxy_read_timeout 120;
        }
    }
