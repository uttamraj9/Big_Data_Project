apiVersion: apps/v1
kind: Deployment
metadata:
  name: training-portal
  namespace: itc-training
  labels:
    app: training-portal
spec:
  replicas: 2
  selector:
    matchLabels:
      app: training-portal
  template:
    metadata:
      labels:
        app: training-portal
    spec:
      containers:
        - name: training-portal
          image: localhost:5000/itc-training-portal:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
