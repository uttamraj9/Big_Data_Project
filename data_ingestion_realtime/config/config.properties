# =============================================================================
# config.properties — Real-time Layer (Kafka + HBase)
# =============================================================================
# Shared configuration for kafka_producer.py and kafka_consumer.py.
# Override any value by setting the equivalent environment variable.
# =============================================================================

# ── FastAPI source ─────────────────────────────────────────────────────────
# The streaming API that serves cc_fraud_trans rows from PostgreSQL.
api.url=http://13.42.152.118:5310

# ── Kafka ──────────────────────────────────────────────────────────────────
kafka.brokers=172.31.3.85:9092
kafka.topic=cc_fraud_stream
kafka.group.id=cc_fraud_consumer_group

# ── Producer tuning ────────────────────────────────────────────────────────
# Number of records fetched from the API per poll cycle.
batch.size=100
# Seconds to wait between consecutive API polls.
poll.interval=5

# ── HBase ──────────────────────────────────────────────────────────────────
# HBase Thrift server (port 9090 by default on Cloudera).
hbase.host=ip-172-31-3-85.eu-west-2.compute.internal
hbase.port=9090

# ── Consumer tuning ────────────────────────────────────────────────────────
# Number of Kafka messages to buffer before a single HBase batch write.
consumer.batch=50
