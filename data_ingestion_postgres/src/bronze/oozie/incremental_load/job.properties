# =============================================================================
# job.properties — Bronze Incremental Load Oozie Coordinator Job
# =============================================================================
# Configuration for the bronze-incremental-coordinator Oozie coordinator.
#
# USAGE — submit the coordinator (for daily scheduling):
#   oozie job -run \
#     -oozie http://ip-172-31-12-74.eu-west-2.compute.internal:11000/oozie \
#     -config job.properties
#
# USAGE — run the workflow once immediately (no coordinator):
#   oozie job -run \
#     -oozie http://ip-172-31-12-74.eu-west-2.compute.internal:11000/oozie \
#     -config job.properties \
#     -Doozie.coord.application.path=
#     -Doozie.wf.application.path=${nameNode}/user/ec2-user/oozie/bronze_incremental_load
# =============================================================================

# ── Cluster endpoints ─────────────────────────────────────────────────────────
nameNode=hdfs://ip-172-31-3-251.eu-west-2.compute.internal:8020
jobTracker=ip-172-31-6-42.eu-west-2.compute.internal:8032
oozie.url=http://ip-172-31-12-74.eu-west-2.compute.internal:11000/oozie

# ── Oozie coordinator path (HDFS location of coordinator.xml) ────────────────
oozie.coord.application.path=${nameNode}/user/ec2-user/oozie/bronze_incremental_load

# ── Coordinator schedule — daily at 10:00 AM UTC ─────────────────────────────
# Adjust end_time when the training session ends to stop the coordinator
start_time=2026-04-09T10:00Z
end_time=2099-12-31T10:00Z

# ── Hive ─────────────────────────────────────────────────────────────────────
hiveserver2_host=ip-172-31-12-74.eu-west-2.compute.internal

# ── HDFS bronze landing zone ──────────────────────────────────────────────────
hdfs_target_dir=/tmp/US_UK_05052025/class_project/input/raw_data_sqoop

# ── PostgreSQL source connection ──────────────────────────────────────────────
db_host=172.31.8.235
db_name=testdb
db_username=admin
db_password=admin123

# ── Oozie shared lib ──────────────────────────────────────────────────────────
oozie.use.system.libpath=true
oozie.libpath=/user/oozie/share/lib
