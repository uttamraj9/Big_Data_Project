# =============================================================================
# job.properties — Bronze Full Load Oozie Job
# =============================================================================
# Configuration for the bronze-full-load Oozie workflow.
#
# USAGE
# -----
#   oozie job -run \
#     -oozie http://ip-172-31-12-74.eu-west-2.compute.internal:11000/oozie \
#     -config job.properties
#
# SECURITY NOTE
# -------------
#   DB credentials are set here for the training environment only.
#   In production, use Oozie credential actions or a secrets manager.
# =============================================================================

# ── Cluster endpoints ─────────────────────────────────────────────────────────
nameNode=hdfs://ip-172-31-3-251.eu-west-2.compute.internal:8020
jobTracker=ip-172-31-6-42.eu-west-2.compute.internal:8032
oozie.url=http://ip-172-31-12-74.eu-west-2.compute.internal:11000/oozie

# ── Oozie workflow path (HDFS location of workflow.xml and supporting files) ──
oozie.wf.application.path=${nameNode}/user/ec2-user/oozie/bronze_full_load

# ── Hive ─────────────────────────────────────────────────────────────────────
hiveserver2_url=jdbc:hive2://ip-172-31-12-74.eu-west-2.compute.internal:10000/

# ── HDFS bronze landing zone ──────────────────────────────────────────────────
hdfs_target_dir=/tmp/US_UK_05052025/class_project/input/raw_data_sqoop

# ── PostgreSQL source connection ──────────────────────────────────────────────
# Override these at runtime or in a sourced .env file before submitting
db_host=172.31.8.235
db_name=testdb
db_username=admin
db_password=admin123

# ── Oozie shared lib (enables Sqoop and Hive2 actions) ───────────────────────
oozie.use.system.libpath=true
oozie.libpath=/user/oozie/share/lib
