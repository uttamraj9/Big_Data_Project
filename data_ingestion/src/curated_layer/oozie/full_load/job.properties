# =============================================================================
# Oozie job properties – Curated Full Load
# =============================================================================

nameNode=hdfs://ip-172-31-3-251.eu-west-2.compute.internal:8020
jobTracker=ip-172-31-3-85.eu-west-2.compute.internal:8032

# Oozie workflow location on HDFS
oozie.wf.application.path=${nameNode}/user/ec2-user/oozie/curated_full_load

# HDFS directory containing the PySpark scripts
hdfs_spark_dir=/user/ec2-user/curated_layer

# Spark launcher JAR (Oozie uses this to bootstrap Spark on YARN)
spark_jar=/usr/lib/spark/lib/spark-assembly.jar

# Use Oozie shared library so Spark/Hive JARs are auto-included
oozie.use.system.libpath=true
